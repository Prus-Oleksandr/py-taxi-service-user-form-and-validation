{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>Driver form</h1>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy}}
    <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
    <button type="submit" class="btn btn-primary">
      Save
    </button>
  </form>
{% endblock %}
